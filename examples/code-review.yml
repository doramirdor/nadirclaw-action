name: AI Code Review
on:
  pull_request:
    types: [opened, synchronize]

permissions:
  contents: read
  pull-requests: write

jobs:
  review:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Start NadirClaw
        uses: doramirdor/nadirclaw-action@v1
        with:
          premium-model: claude-sonnet-4-20250514
          cheap-model: gemini-2.5-flash
          anthropic-api-key: ${{ secrets.ANTHROPIC_API_KEY }}
          google-api-key: ${{ secrets.GOOGLE_API_KEY }}

      - name: Run AI review
        run: |
          pip install aider-chat
          git diff origin/main...HEAD | aider \
            --message "Review this diff. Flag bugs, suggest improvements." \
            --yes
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
